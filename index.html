<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoidBerry SMP | Official Server</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Silkscreen&display=swap" rel="stylesheet">

  <style>
    /* --- CSS VARIABLES --- */
    :root {
      --bg-dark: #050508;
      --void-purple: #4a00e0;
      --berry-pink: #ff0055;
      --mc-green: #22c55e;
      --mc-green-glow: rgba(34, 197, 94, 0.4);
      --card-bg: rgba(20, 20, 30, 0.6);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Poppins', sans-serif;
      text-align: center;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- ANIMATED BACKGROUND --- */
    .bg-effects {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: radial-gradient(circle at 50% 0%, #1c0a3b 0%, var(--bg-dark) 60%);
      z-index: -1;
    }

    /* --- HERO SECTION --- */
    .hero {
      width: 100%;
      padding: 60px 20px 40px;
      position: relative;
    }

    /* Banner overlay simulating a blurred Minecraft background */
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 280px;
      background: url('banner.jpg') center/cover no-repeat;
      opacity: 0.3;
      mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
      z-index: -1;
    }

    .logo {
      width: 160px;
      height: 160px;
      border-radius: 24px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 30px rgba(74, 0, 224, 0.5);
      animation: float 4s ease-in-out infinite;
      object-fit: cover;
      background: #111; /* Fallback if logo isn't loaded */
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    /* --- TYPOGRAPHY --- */
    h1 {
      font-family: 'Silkscreen', cursive;
      font-size: 2.5rem;
      background: linear-gradient(90deg, var(--berry-pink), #ff758c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0px 4px 20px rgba(255, 0, 85, 0.3);
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 5px;
      letter-spacing: 1px;
    }

    /* --- SERVER STATUS --- */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      padding: 8px 16px;
      border-radius: 50px;
      margin: 25px 0;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--mc-green);
    }

    .pulse {
      width: 12px;
      height: 12px;
      background-color: var(--mc-green);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--mc-green-glow);
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; box-shadow: 0 0 15px var(--mc-green); }
      50% { opacity: 0.4; box-shadow: 0 0 5px var(--mc-green); }
    }

    /* --- MAIN CONTENT CONTAINER --- */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px;
      width: 100%;
    }

    /* --- BUTTONS --- */
    .discord-btn {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      background: #5865F2; /* Discord Blurple */
      padding: 16px 24px;
      border-radius: 16px;
      text-decoration: none;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 40px;
      transition: all 0.2s ease;
      box-shadow: 0 8px 0 #3b45a6, 0 15px 20px rgba(88, 101, 242, 0.4);
    }

    .discord-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 0 #3b45a6, 0 20px 25px rgba(88, 101, 242, 0.5);
    }

    .discord-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #3b45a6;
    }

    /* --- IP CARDS (GLASSMORPHISM) --- */
    .section-title {
      font-family: 'Silkscreen', cursive;
      color: white;
      font-size: 1.5rem;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .ip-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }

    @media (max-width: 600px) {
      .ip-grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 24px;
      text-align: left;
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.3);
    }

    .card h3 {
      font-size: 1.2rem;
      margin-bottom: 15px;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card p {
      color: var(--text-muted);
      font-family: monospace;
      font-size: 1.1rem;
      background: rgba(0, 0, 0, 0.4);
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .copy-btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: var(--mc-green);
      color: black;
    }

    .copy-btn.copied {
      background: var(--mc-green);
      color: black;
    }

    /* --- FOOTER --- */
    .footer {
      margin-top: auto;
      padding: 30px;
      font-size: 0.9rem;
      color: var(--text-muted);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
</head>

<body>

  <div class="bg-effects"></div>

  <header class="hero">
    <img src="logo.png" alt="VoidBerry SMP Logo" class="logo" onerror="this.src='https://via.placeholder.com/160/1a1a2e/ff0055?text=VB'">
    <h1>VoidBerry SMP</h1>
    <p class="subtitle">Survive • Build • Explore • Together</p>
    
    <div class="status">
      <div class="pulse"></div>
      Server Online • Join Now
    </div>
  </header>

  <main class="container">
    
    <a href="https://discord.gg/YOUR-LINK" class="discord-btn" target="_blank">
      <svg width="24" height="24" viewBox="0 0 127.14 96.36" fill="currentColor">
        <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.31,46,96.2,53,91.08,65.69,84.69,65.69Z"/>
      </svg>
      Join the Discord
    </a>

    <h2 class="section-title">CHOOSE YOUR EDITION</h2>

    <div class="ip-grid">
      <div class="card">
        <h3>☕ Java Edition</h3>
        <p id="java-ip">play.voidberry.com</p>
        <button class="copy-btn" onclick="copyIP('java-ip', this)">Copy IP</button>
      </div>

      <div class="card">
        <h3>📱 Bedrock Edition</h3>
        <p id="bedrock-ip">play.voidberry.com</p>
        <p style="font-size: 0.9rem; color: #64748b;">Port: 19132</p>
        <button class="copy-btn" onclick="copyIP('bedrock-ip', this)">Copy IP & Port</button>
      </div>
    </div>

  </main>

  <footer class="footer">
    © 2026 VoidBerry SMP. Not affiliated with Mojang AB.
  </footer>

  <script>
    function copyIP(elementId, btnElement) {
      // Get the text to copy
      const ipText = document.getElementById(elementId).innerText;
      let textToCopy = ipText;
      
      // If it's bedrock, copy both IP and Port format
      if(elementId === 'bedrock-ip') {
         textToCopy = ipText + " | Port: 19132";
      }

      // Copy to clipboard
      navigator.clipboard.writeText(textToCopy).then(() => {
        // Change button styling temporarily to show success
        const originalText = btnElement.innerText;
        btnElement.innerText = "✔ Copied!";
        btnElement.classList.add("copied");

        // Reset button after 2 seconds
        setTimeout(() => {
          btnElement.innerText = originalText;
          btnElement.classList.remove("copied");
        }, 2000);
      });
    }
  </script>

</body>
</html>
