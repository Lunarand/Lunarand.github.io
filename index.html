<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gaming Burst</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font (Minecraft-like vibe) -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at top, #0f172a, #020617);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
    }

    /* Animated background glow */
    body::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(34,197,94,0.3), transparent 70%);
      filter: blur(100px);
      animation: moveGlow 10s infinite alternate;
    }

    @keyframes moveGlow {
      from { transform: translate(-100px, -100px); }
      to { transform: translate(100px, 100px); }
    }

    .card {
      position: relative;
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 40px 25px;
      width: 90%;
      max-width: 350px;
      text-align: center;
      box-shadow: 0 0 40px rgba(34,197,94,0.2);
      animation: fadeIn 1s ease;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
      color: #22c55e;
      text-shadow: 0 0 10px rgba(34,197,94,0.7);
    }

    p {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 25px;
    }

    .btn {
      display: block;
      margin: 12px 0;
      padding: 14px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      color: white;
      transition: 0.3s;
      position: relative;
      overflow: hidden;
      font-size: 15px;
    }

    .btn::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
      top: 0;
      left: -100%;
      transition: 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255,255,255,0.3);
    }

    .discord {
      background: #5865F2;
    }

    .youtube {
      background: #FF0000;
    }

    .instagram {
      background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
    }

    .server {
      background: linear-gradient(90deg, #22c55e, #4ade80);
      color: black;
    }

    .footer {
      margin-top: 20px;
      font-size: 11px;
      color: #64748b;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile tweaks */
    @media (max-width: 400px) {
      .card {
        padding: 30px 20px;
      }
      h1 {
        font-size: 22px;
      }
    }

  </style>
</head>

<body>

  <div class="card">
    <h1>⛏ Gaming Burst</h1>
    <p>Minecraft Server • Join the community</p>

    <a href="#" class="btn server">🟢 Server IP: play.yourserver.com</a>

    <a href="https://discord.gg/YOUR-LINK" target="_blank" class="btn discord">💬 Join Discord</a>
    <a href="https://youtube.com/YOUR-CHANNEL" target="_blank" class="btn youtube">▶ YouTube</a>
    <a href="https://instagram.com/YOUR-ID" target="_blank" class="btn instagram">📸 Instagram</a>

    <div class="footer">
      © 2026 Gaming Burst
    </div>
  </div>

</body>
</html>
