<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoidBerry SMP</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  background: #020617;
  color: white;
  text-align: center;
}

/* Banner */
.banner {
  width: 100%;
  height: 220px;
  background: url('banner.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Logo */
.logo {
  width: 140px;
  margin-top: -70px;
  border-radius: 20px;
}

/* Container */
.container {
  padding: 20px;
}

/* Title */
h1 {
  color: #22c55e;
  margin-top: 10px;
}

.subtitle {
  color: #94a3b8;
  font-size: 14px;
  margin-bottom: 20px;
}

/* Discord Button */
.discord {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  padding: 15px;
  border-radius: 12px;
  text-decoration: none;
  color: black;
  font-weight: bold;
  margin-bottom: 25px;
}

/* Section Title */
.section-title {
  margin: 15px 0;
  color: #22c55e;
}

/* Cards */
.card {
  background: rgba(30, 41, 59, 0.6);
  border-radius: 12px;
  padding: 15px;
  margin: 10px 0;
  text-align: left;
}

/* Copy Button */
.copy-btn {
  float: right;
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  cursor: pointer;
  font-weight: bold;
}

/* Footer */
.footer {
  margin-top: 30px;
  font-size: 12px;
  color: #64748b;
}
</style>
</head>

<body>

<div class="banner"></div>

<img src="logo.png" class="logo">

<div class="container">

<h1>VOIDBERRY SMP</h1>
<p class="subtitle">Survive • Build • Explore • Together</p>

<a href="https://discord.gg/YOUR-LINK" class="discord">
  <span>💬 Join Discord</span>
  <span>→</span>
</a>

<h3 class="section-title">SERVER IP</h3>

<div class="card">
  <strong>Java Edition</strong>
  <button class="copy-btn" onclick="copyText('java')">Copy</button>
  <p id="java">play.yourserver.com</p>
</div>

<div class="card">
  <strong>Bedrock Edition</strong>
  <button class="copy-btn" onclick="copyText('bedrock')">Copy</button>
  <p>IP: <span id="bedrock">play.yourserver.com</span></p>
  <p>Port: 19132</p>
</div>

<div class="footer">
© 2026 VoidBerry SMP
</div>

</div>

<script>
function copyText(id) {
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  alert("Copied: " + text);
}
</script>

</body>
</html>
